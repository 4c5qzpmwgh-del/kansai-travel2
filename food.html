        .food-card {

        .tag-評價 { background: #FFF3E0; color: #E65100; }

    ];

    let currentCat = '全部';

    function filterCat(cat) {
        currentCat = cat;
        const chips = document.querySelectorAll('.chip');
        chips.forEach(c => {
            if(c.innerText.includes(cat.substring(0,2))) c.classList.add('active');
            else c.classList.remove('active');
        });
        if(cat === '全部') chips[0].classList.add('active');
        renderFood();
    }

    function renderFood() {
        const listEl = document.getElementById('foodList');
        const sortBy = document.getElementById('sortSelect').value;
        
        let filtered = foodDB.filter(item => currentCat === '全部' || item.type === currentCat);

        filtered.sort((a, b) => {
            if(sortBy === 'popularity') return b.weight - a.weight;
            if(sortBy === 'price_low') return a.price - b.price;
            if(sortBy === 'price_high') return b.price - a.price;
        });

        listEl.innerHTML = filtered.map(item => {
            // 點擊卡片跳轉 Google Map 搜尋店名 + 地區
            const googleMapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name + ' ' + item.area)}`;
            
            // 如果是評價推薦，顯示星星
            const starHtml = item.cat === "評價推薦" ? `<span class="star-rating">${item.star}</span>` : "";

            return `
                <a href="${googleMapUrl}" target="_blank" class="food-card ${item.cat}">
                    <div class="food-info">
                        <div class="food-header">
                            <span class="food-tag tag-${item.cat.substring(0,2)}">${item.cat}</span>
                            ${starHtml}
                        </div>
                        <div class="food-name">${item.name}</div>
                        <div class="food-desc">${item.desc}</div>
                        <div class="food-meta">
                            <div class="food-price">¥ ${item.price.toLocaleString()} ~</div>
                            <div class="food-loc"><i class="fas fa-map-marker-alt"></i> ${item.area}</div>
                        </div>
                    </div>
                </a>
            `;
        }).join('');
    }

    renderFood();
</script>
