            {name:"白濱溫泉", stay:3, open:"00:00", close:"23:59", city:"和歌山", fullDay:false}, {name:"三段壁", stay:1, open:"08:00", close:"17:00", city:"和歌山", fullDay:false}, {name:"圓月島", stay:1, open:"00:00", close:"23:59", city:"和歌山", fullDay:false}, {name:"Adventure World", stay:6, open:"10:00", close:"17:00", city:"和歌山", fullDay:false}

let selectedSet = new Set();
let scheduledDays = []; 
let config = {};

function renderSelection() {
    const target = document.getElementById('accordion');
    for (const [region, categories] of Object.entries(masterDB)) {
        const div = document.createElement('div'); div.className = 'city-accordion';
        div.innerHTML = `<div class="city-header" onclick="this.nextElementSibling.classList.toggle('active')"><span>${region}</span> <i class="fas fa-chevron-down"></i></div>`;
        const content = document.createElement('div'); content.className = 'city-content';
        
        for (const [catName, spots] of Object.entries(categories)) {
            const catTitle = document.createElement('div'); catTitle.className = 'cat-title'; catTitle.innerText = catName;
            content.appendChild(catTitle);
            const grid = document.createElement('div'); grid.className = 'spot-grid';
            spots.forEach(s => {
                const item = document.createElement('div'); 
                item.className = `spot-item ${s.fullDay ? 'full-day' : ''}`;
                const badge = document.createElement('div');
                badge.className = `fd-toggle-btn ${s.fullDay ? 'is-full' : ''}`;
                badge.innerHTML = s.fullDay ? '<i class="fas fa-crown"></i> 獨佔全日' : '<i class="far fa-clock"></i> 依時數';
                badge.onclick = (e) => {
                    e.stopPropagation(); s.fullDay = !s.fullDay; 
                    badge.className = `fd-toggle-btn ${s.fullDay ? 'is-full' : ''}`;
                    badge.innerHTML = s.fullDay ? '<i class="fas fa-crown"></i> 獨佔全日' : '<i class="far fa-clock"></i> 依時數';
                    item.classList.toggle('full-day', s.fullDay);
                };
                const info = document.createElement('div');
                info.innerHTML = `<div>${s.name}</div><div style="font-size:10px; color:#888; margin-top:3px;">${s.open}-${s.close} (${s.stay}h)</div>`;
                item.onclick = () => { item.classList.toggle('active'); selectedSet.has(s) ? selectedSet.delete(s) : selectedSet.add(s); };
                item.appendChild(badge); item.appendChild(info); grid.appendChild(item);
            });
            content.appendChild(grid);
        }
        div.appendChild(content); target.appendChild(div);
    }
}

function t2m(t) { let [h, m] = t.split(':').map(Number); return h * 60 + m; }
function m2t(m) { let h = Math.floor(m / 60) % 24; let min = Math.round(m % 60); return `${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}`; }

function getTransitMins(fromCity, toCity) {
    if (fromCity === "機場" || toCity === "機場") return 50;
    if (fromCity === toCity || (fromCity.includes("大阪") && toCity === "大阪")) return 30; 
    const map = { "大阪-京都": 55, "京都-大阪": 55, "大阪-奈良": 50, "奈良-大阪": 50, "大阪-神戶": 45, "神戶-大阪": 45, "大阪-和歌山": 80, "大阪-郊區": 95 };
    return map[`${fromCity}-${toCity}`] || 65; 
}

function initPlanner() {
    if(selectedSet.size === 0) return alert("請勾選想去的景點！");
    config = { arr: document.getElementById('arrTime').value, dep: document.getElementById('depTime').value, hotel: document.getElementById('hotel').value, days: parseInt(document.getElementById('days').value) };
    let spots = Array.from(selectedSet).map(s => ({...s}));
    let fullDaySpots = spots.filter(s => s.fullDay);
    let normalSpots = spots.filter(s => !s.fullDay);
    normalSpots.sort((a, b) => {
        if(a.city !== b.city) return a.city.localeCompare(b.city);
        return t2m(a.open) - t2m(b.open);
    });
    scheduledDays = Array.from({length: config.days}, () => []);
    let unassigned = [];
    for (let fSpot of fullDaySpots) {
        let placed = false;
        for (let i = 1; i < config.days - 1; i++) { if (scheduledDays[i].length === 0) { scheduledDays[i].push(fSpot); placed = true; break; } }
        if (!placed) { for (let i = 0; i < config.days; i++) { if (scheduledDays[i].length === 0) { scheduledDays[i].push(fSpot); placed = true; break; } } }
        if (!placed) unassigned.push(fSpot);
    }
    for (let i = 0; i < config.days; i++) {
        if (scheduledDays[i].some(s => s.fullDay)) continue;
        let currentMins = (i === 0) ? t2m(config.arr) + 60 : t2m("09:00");
        let dayLimit = (i === config.days - 1) ? t2m(config.dep) - 150 : t2m("21:00"); 
        let currentLoc = (i === 0) ? "機場" : "大阪";
        let spotIdx = 0;
        while (spotIdx < normalSpots.length) {
            let spot = normalSpots[spotIdx];
            let transit = getTransitMins(currentLoc, spot.city);
            let arrivalMins = currentMins + transit;
            if (arrivalMins < t2m(spot.open)) arrivalMins = t2m(spot.open);
            let endMins = arrivalMins + (spot.stay * 60);
            if (endMins <= dayLimit && arrivalMins < t2m(spot.close)) {
                scheduledDays[i].push(spot);
                currentMins = endMins; currentLoc = spot.city; normalSpots.splice(spotIdx, 1); 
            } else { spotIdx++; }
        }
    }
    unassigned = unassigned.concat(normalSpots);
    document.getElementById('resultArea').style.display = 'block';
    renderResult(unassigned);
}

function adjust(d, s, val) { scheduledDays[d][s].stay = Math.max(0.5, scheduledDays[d][s].stay + val); renderResult(); }
function move(d, s, dir) { 
    if(s+dir < 0 || s+dir >= scheduledDays[d].length) return;
    [scheduledDays[d][s], scheduledDays[d][s+dir]] = [scheduledDays[d][s+dir], scheduledDays[d][s]]; 
    renderResult(); 
}
function del(d, s) { scheduledDays[d].splice(s, 1); renderResult(); }

function renderResult(unassigned = []) {
    const target = document.getElementById('resultArea');
    let html = '<h3><i class="fas fa-clipboard-check"></i> 大阪出發行程表</h3>';
    if (unassigned && unassigned.length > 0) {
        let names = unassigned.map(s => s.name).join('、');
        html += `<div class="unassigned-alert"><i class="fas fa-exclamation-triangle"></i> 行程塞不下囉：<br><span style="font-weight:normal;">${names}</span></div>`;
    }
    for (let d = 0; d < config.days; d++) {
        let isFullDay = scheduledDays[d].some(s => s.fullDay);
        html += `<div class="day-block"><div class="day-header">第 ${d+1} 天 ${isFullDay?'(全日專屬)':''}</div><div class="timeline">`;
        let now = (d === 0) ? t2m(config.arr) + 60 : t2m("09:00");
        let loc = (d === 0) ? "機場" : "大阪";
        if (d === 0) html += `<div class="node"><div class="node-time">${m2t(now)}</div><div class="node-title">機場入境</div></div>`;
        scheduledDays[d].forEach((spot, sIdx) => {
            let trans = getTransitMins(loc, spot.city); now += trans; 
            html += `<div class="transit"><i class="fas fa-car-side"></i> 從 ${loc} 前往 ${spot.name} (約 ${trans} 分)</div>`;
            let open = t2m(spot.open), close = t2m(spot.close);
            if(now < open) { html += `<div class="node" style="opacity:0.6;"><div class="node-time">${m2t(now)}</div><div class="node-title">等待開門 (${open-now}分)</div></div>`; now = open; }
            let end = now + (spot.stay * 60);
            let isWarn = (end > close && spot.close !== "23:59");
            html += `
                <div class="node ${spot.fullDay?'is-full-day':''}">
                    <div class="node-time">${m2t(now)} - ${m2t(end)}</div>
                    <div class="node-title">${spot.name} <span style="font-size:11px; font-weight:normal; color:#888;">(${spot.city})</span></div>
                    <div class="status-tag ${isWarn?'status-warn':'status-ok'}">${isWarn?'⚠️ 超過打烊':'✅ 營業中'} (${spot.open}-${spot.close})</div>
                    <div class="node-ctrl">
                        <button class="c-btn" onclick="adjust(${d}, ${sIdx}, -0.5)">-30m</button>
                        <span style="font-size:12px; font-weight:bold; margin:0 5px;">停留 ${spot.stay}h</span>
                        <button class="c-btn" onclick="adjust(${d}, ${sIdx}, 0.5)">+30m</button>
                        <button class="c-btn" onclick="move(${d}, ${sIdx}, -1)">↑</button>
                        <button class="c-btn" onclick="move(${d}, ${sIdx}, 1)">↓</button>
                        <button class="c-btn" onclick="del(${d}, ${sIdx})" style="color:red;">刪除</button>
                    </div>
                </div>
            `;
            now = end; loc = spot.city;
        });
        if(d === config.days - 1) {
            let depLimit = t2m(config.dep) - 150;
            let transToAir = getTransitMins(loc, "機場"); now += transToAir;
            html += `<div class="transit"><i class="fas fa-plane"></i> 前往關西機場 (約 ${transToAir} 分)</div>`;
            html += `<div class="node"><div class="node-time">${m2t(now)}</div><div class="node-title">抵達機場</div>${now > depLimit ? '<div class="status-tag status-warn">⚠️ 趕不上飛機！</div>':''}</div>`;
        } else {
            let transToH = getTransitMins(loc, "大阪"); now += transToH;
            html += `<div class="transit"><i class="fas fa-bed"></i> 返回大阪住宿處 (約 ${transToH} 分)</div>`;
            html += `<div class="node"><div class="node-time">${m2t(now)}</div><div class="node-title">回到飯店休息</div></div>`;
        }
        html += `</div></div>`;
    }
    target.innerHTML = html;
}

renderSelection();
</script>
<script>
    // 魔法排程完成後，一鍵同步給旅伴
    async function saveToCloud() {
        const btn = document.getElementById('btnCloud');
        btn.innerText = "正在儲存...";
        
        const { error } = await sb.from('saved_itinerary').upsert({
            id: '99999999-9999-9999-9999-999999999999', // 固定 ID 讓全員共享
            config: config,
            selected_spots: Array.from(selectedSet),
            schedule: scheduledDays
        });
        
        if(!error) alert("行程已同步到雲端！");
        btn.innerText = "💾 同步到雲端";
    }

    // 讀取雲端行程
    async function loadFromCloud() {
        const { data } = await sb.from('saved_itinerary').select('*').single();
        if (data) {
            scheduledDays = data.schedule;
            renderResult();
        }
    }
</script>
